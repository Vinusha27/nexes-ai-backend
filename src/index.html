<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXES AI - Game Engine</title>
    <style>
        body {
            font-family: sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }
        
        textarea {
            width: 80%;
            height: 100px;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 20px;
            color: black;
        }
        
        button {
            background: #38bdf8;
            color: black;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        
        #output {
            background: #1e293b;
            width: 80%;
            padding: 20px;
            border-radius: 8px;
            margin-top: 30px;
            white-space: pre-wrap;
            border: 1px solid #334155;
        }
    </style>
</head>

<body>
    <h1>🚀 NEXES AI Game Engine</h1>
    <textarea id="prompt" placeholder="Type your game idea (e.g., A 2D platformer with gravity)..."></textarea>
    <button onclick="generateGame()">Generate Engine Code</button>
    <div id="output">// Your generated code will appear here...</div>

    <script>
        async function generateGame() {
            const prompt = document.getElementById('prompt').value;
            const output = document.getElementById('output');
            output.innerText = "Generating your game engine... Please wait...";

            try {
                // Connecting to your LIVE Render backend
                const response = await fetch('https://nexes-ai-backend.onrender.com/api/create_game', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        prompt: prompt
                    })
                });

                const data = await response.json();
                output.innerText = data.generatedCode || "Error: Could not generate code.";
            } catch (error) {
                output.innerText = "Error connecting to backend: " + error.message;
            }
        }
    </script>
</body>

</html>
